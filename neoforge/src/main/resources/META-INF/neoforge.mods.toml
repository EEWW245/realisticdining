modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/realisticdining/issues"

[[mods]]
modId = "realisticdining"
version = "${version}"
displayName = "Realistic Dining"
authors = "realisticdining"
description = '''
A realistic dining mod for Minecraft. This mod adds realistic cooking mechanics including chopping boards, woks, and chopsticks.

Features:
- Chopping Board: Cut ingredients with realistic animations
- Wok: Cook dishes with stir-fry mechanics
- Green Onion Crop: Plant and harvest green onions
- Chopsticks: Pick up and eat food
- Roast Chicken: Placeable food block
- Rice Bowl: Placeable food block
'''

[[mixins]]
config = "realisticdining-common.mixins.json"

[[mixins]]
config = "realisticdining-neoforge.mixins.json"

[[dependencies.realisticdining]]
modId = "neoforge"
mandatory = true
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.realisticdining]]
modId = "minecraft"
mandatory = true
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"

[[dependencies.realisticdining]]
modId = "architectury"
mandatory = true
versionRange = "[${architectury_api_version},)"
ordering = "AFTER"
side = "BOTH"
